<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - JojoTech</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Contact Us</h1>
    </header>
    <main>
        <section>
            <h2>Get in Touch</h2>
            <form action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </section>
        <section>
            <h2>Contact Information</h2>
            <p>Phone: +1 (123) 456-7890</p>
            <p>Email: info@jojotech.com</p>
        </section>
        <section>
            <h2>Location Map</h2>
            <div>
                <iframe src="https://maps.google.com/maps?q=JojoTech%20Location&output=embed" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>
        <section>
            <h2>Inquiry Options</h2>
            <ul>
                <li><strong>Maintenance Services</strong></li>
                <li><strong>Construction Services</strong></li>
                <li><strong>General Inquiries</strong></li>
            </ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 JojoTech. All rights reserved.</p>
    </footer>
</body>
</html>
